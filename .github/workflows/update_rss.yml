name: Update RSS Feed

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 newspaper3k lxml

      - name: Run radar
        run: python media_radar.py

      - name: Commit RSS
        run: |
          git config --global user.name "rss-bot"
          git config --global user.email "bot@example.com"
          git add rss/media.xml media_db.json
          git commit -m "auto update rss" || echo "no changes"
          git push
