name: Update Media Radar Feed

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run aggregator
        run: python media_radar.py

      - name: Commit updated RSS
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add rss/media.xml media_db.json || true
          git commit -m "update media radar feed" || echo "no changes"
          git push
